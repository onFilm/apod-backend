name: Update APOD Data

on:
  schedule:
    # Run automatically every day at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Target date (YYYY-MM-DD)'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  update-apod:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Update Script
        id: update_script
        run: node scripts/update-apod.js "${{ github.event.inputs.date }}"

      - name: Set Commit Message
        id: commit_msg
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "action=backfill" >> $GITHUB_OUTPUT
          else
            echo "action=add" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        id: cpr
        if: steps.update_script.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore(apod): ${{ steps.commit_msg.outputs.action }} APOD for ${{ steps.update_script.outputs.apod_date }}"
          title: "chore(apod): ${{ steps.commit_msg.outputs.action }} APOD for ${{ steps.update_script.outputs.apod_date }}"
          branch: "update-apod-${{ steps.update_script.outputs.apod_date }}"
          base: main
          body: |
            Automated PR to update APOD data for ${{ steps.update_script.outputs.apod_date }}.
            
      - name: Enable Pull Request Automerge
        if: steps.cpr.outputs.pull-request-operation == 'created'
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          pull-request-number: ${{ steps.cpr.outputs.pull-request-number }}
          merge-method: squash
